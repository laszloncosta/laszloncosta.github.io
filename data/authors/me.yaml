bio: "Lászlon Costa é Professor Assistente na Universidade Federal do Cariri (UFCA). Possui doutorado em Engenharia de Teleinformática pela Universidade Federal do Ceará (UFC), com pesquisa desenvolvida no GTEL em colaboração com a Ericsson e período como pesquisador visitante na Technische Universität Darmstadt, na Alemanha. Seus interesses de pesquisa incluem redes sem fio, gerenciamento de recursos de rádio, sistemas MU-MIMO e o uso de inteligência artificial e técnicas de otimização em sistemas de comunicação."
