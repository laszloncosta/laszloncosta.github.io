bio: "Lászlon Rodrigues da Costa é Professor da Universidade Federal do Cariri (UFCA) e Coordenador do Núcleo de Inovação Tecnológica (NIT/PRPI). Possui doutorado em Engenharia de Teleinformática pela Universidade Federal do Ceará (UFC), com período de pesquisa na Technische Universität Darmstadt, Alemanha, mestrado em Engenharia Elétrica e de Computação e graduação em Engenharia de Computação pela UFC. Atuou como pesquisador de pós-doutorado na UFC e como Gerente de Projetos de TI no Instituto Atlântico. Seus interesses incluem redes de acesso via rádio para 5G e 6G, gerência de recursos de rádio, O-RAN, hybrid beamforming, beam tracking, C-RAN, MIMO massivo e otimização aplicada a sistemas de comunicação."
