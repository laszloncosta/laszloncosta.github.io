bio: "Lászlon Rodrigues da Costa is an Assistant Professor at the Federal University of Cariri (UFCA) and Coordinator of the Technological Innovation Office (NIT/PRPI). He holds a PhD in Teleinformatics Engineering from the Federal University of Ceará (UFC), including a research period at Technische Universität Darmstadt, Germany, as well as an MSc in Electrical and Computer Engineering and a BSc in Computer Engineering from UFC. He has worked as a postdoctoral researcher at UFC and as an IT Project Manager at Instituto Atlântico. His research interests include 5G and 6G radio access networks, radio resource management, O-RAN, hybrid beamforming, beam tracking, C-RAN, massive MIMO, and optimization applied to communication systems."
