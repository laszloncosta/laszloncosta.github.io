role: "Professor and Researcher"
bio: "Lászlon Costa is an Assistant Professor at the Federal University of Cariri (UFCA). He holds a PhD in Teleinformatics Engineering from the Federal University of Ceará (UFC), with research conducted at GTEL in collaboration with Ericsson and a period as a visiting researcher at Technische Universität Darmstadt in Germany. His research interests include wireless networks, radio resource management, MU-MIMO systems, and the use of artificial intelligence and optimization techniques in communication systems."
